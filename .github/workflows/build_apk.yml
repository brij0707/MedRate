name: Build MedRate Beta APK
on: 
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mobile_app

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.0'
          channel: 'stable'

      - name: Inject Secrets into Config
        run: |
          echo "class AppConfig {
            static const String geminiApiKey = '${{ secrets.GEMINI_API_KEY }}';
            static const String supabaseUrl = '${{ secrets.SUPABASE_URL }}';
            static const String supabaseAnonKey = '${{ secrets.SUPABASE_ANON_KEY }}';
          }" > lib/config.dart

      - name: Install Dependencies
        run: flutter pub get

      - name: Repair Android Files
        run: |
          flutter create . --platforms android
          # This line forces the Internet Permission into the newly created manifest
          sed -i '/<application/i \    <uses-permission android:name="android.permission.INTERNET" />' android/app/src/main/AndroidManifest.xml

      - name: Build Debug APK
        # This flag ensures all device architectures are included in one file
        run: flutter build apk --debug --target-platform android-arm,android-arm64,android-x64

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: medrate-beta-app
          path: mobile_app/build/app/outputs/flutter-apk/app-debug.apk
